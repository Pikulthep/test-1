<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>รับลิงก์เข้าสู่ระบบ | โปรเจกต์ของฉัน</title>
    <!-- เปลี่ยนมาใช้ CSS ของตัวเอง -->
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="user-bg">
    <div class="user-wrap">
        <div class="user-card">
            <div class="logo">N</div>
            <h1>กรอกรหัสรับสิทธิ์</h1>
            <p class="muted">วางรหัสที่คุณได้รับจากแอดมิน เพื่อรับลิงก์เข้าดู (รองรับ PC + Mobile)</p>
            <form method="post" action="/api/redeem" autocomplete="off">
                <input class="big-code" name="code" required placeholder="ตัวอย่าง: LXSCXJZWC3" autofocus pattern="[A-Za-z0-9_-]{4,32}" maxlength="32">
                <button class="btn primary big" type="submit">รับลิงก์เข้าสู่ระบบ</button>
            </form>
            <p class="muted small">หากพบปัญหารหัสใช้งานไม่ได้ ระบบจะทำการเปลี่ยนให้ใหม่โดยอัตโนมัติ</p>
        </div>
    </div>
</body>
</html>
